name: Docker Image CI

on:
  push:
    branches: [ dev ]
  workflow_run:
    workflows: ["Bump version"]
    types: [completed]
    branches: [main]

env:
  REGCTL_VERSION: v0.11.5
  REGCTL_LINUX_AMD64_SHA256: c93aa7638749f5aaac1a8e01787321889c78f0101809bb2880343478d0ba0467

jobs:
  buildx:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Get version from git
        shell: bash
        run: |
          set -euo pipefail
          tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*')"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set release channel for dev
        if: ${{ github.ref_name == 'dev' }}
        run: echo "RELEASE_CHANNEL=-dev" >> "$GITHUB_ENV"

      - name: Show release version and channel
        run: echo "RELEASE_VERSION=$RELEASE_VERSION RELEASE_CHANNEL=$RELEASE_CHANNEL"

      - name: Load reproducible build pins
        run: grep -vE '^[[:space:]]*(#|$)' reproducible.env >> "$GITHUB_ENV"

      - name: Compute build settings
        id: repro
        run: |
          echo "SOURCE_DATE_EPOCH=0" >> "$GITHUB_ENV"
          push=false
          if { [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.ref_name }}" = "main" ]; } \
             || { [ -n "${RELEASE_CHANNEL:-}" ] && [ "${{ github.event_name }}" = "push" ]; }; then
            push=true
          fi
          echo "push=$push" >> "$GITHUB_OUTPUT"

      - name: Normalize file modes
        run: find . -path ./.git -prune -o -exec chmod go-w {} +

      - name: Authenticate to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=${{ env.BUILDKIT_REF }}

      - name: Authenticate to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push containers
        run: |
          PUSH_FLAG=""
          [ "${{ steps.repro.outputs.push }}" = "true" ] && PUSH_FLAG="--push"
          ./build_docker_compose.sh \
            --set "*.platform=linux/amd64,linux/arm64" \
            --set "*.tags=ghcr.io/spr-networks/spr-vaultwarden:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL}" \
            --set "*.tags=ghcr.io/spr-networks/spr-vaultwarden:latest${RELEASE_CHANNEL}" \
            --set "*.labels.org.supernetworks.ci=true" \
            --set "*.labels.org.supernetworks.version=${RELEASE_VERSION:-latest}${RELEASE_CHANNEL}" \
            $PUSH_FLAG

      - name: Install regctl
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          curl -fsSLo /tmp/regctl \
            "https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64"
          echo "${REGCTL_LINUX_AMD64_SHA256}  /tmp/regctl" | sha256sum -c -
          sudo install -m 0755 /tmp/regctl /usr/local/bin/regctl

      - name: Remove inherited exposed-port metadata
        if: ${{ steps.repro.outputs.push == 'true' }}
        env:
          IMAGE: ghcr.io/spr-networks/spr-vaultwarden:${{ env.RELEASE_VERSION || 'latest' }}${{ env.RELEASE_CHANNEL }}
          LATEST_IMAGE: ghcr.io/spr-networks/spr-vaultwarden:latest${{ env.RELEASE_CHANNEL }}
        run: |
          regctl image mod "$IMAGE" --replace --expose-rm 80/tcp
          regctl image copy "$IMAGE" "$LATEST_IMAGE"
          for platform in linux/amd64 linux/arm64; do
            test "$(regctl image inspect --platform "$platform" "$IMAGE" --format '{{len .Config.ExposedPorts}}')" = 0
          done

      - name: Resolve pushed image digest
        id: digest
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            "ghcr.io/spr-networks/spr-vaultwarden:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: ${{ steps.repro.outputs.push == 'true' }}
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign release tags
        if: ${{ steps.repro.outputs.push == 'true' }}
        env:
          IMG1: ghcr.io/spr-networks/spr-vaultwarden:${{ env.RELEASE_VERSION || 'latest' }}${{ env.RELEASE_CHANNEL }}@${{ steps.digest.outputs.digest }}
          IMG2: ghcr.io/spr-networks/spr-vaultwarden:latest${{ env.RELEASE_CHANNEL }}@${{ steps.digest.outputs.digest }}
        run: cosign sign --yes "$IMG1" "$IMG2"

      - name: Generate SLSA provenance predicate
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          cat > /tmp/predicate.json <<EOF
          {
            "buildDefinition": {
              "buildType": "https://actions.github.io/buildtypes/workflow/v1",
              "externalParameters": {
                "workflow": {
                  "ref": "${{ github.ref }}",
                  "repository": "${{ github.server_url }}/${{ github.repository }}",
                  "path": ".github/workflows/docker-image.yml"
                }
              },
              "internalParameters": {
                "github": {
                  "event_name": "${{ github.event_name }}",
                  "repository_id": "${{ github.repository_id }}",
                  "repository_owner_id": "${{ github.repository_owner_id }}"
                }
              },
              "resolvedDependencies": [{
                "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                "digest": { "gitCommit": "${{ github.sha }}" }
              }]
            },
            "runDetails": {
              "builder": {
                "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/docker-image.yml@${{ github.ref }}"
              },
              "metadata": {
                "invocationId": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
              }
            }
          }
          EOF

      - name: Attest build provenance
        if: ${{ steps.repro.outputs.push == 'true' }}
        env:
          IMG: ghcr.io/spr-networks/spr-vaultwarden@${{ steps.digest.outputs.digest }}
        run: cosign attest --yes --type slsaprovenance1 --predicate /tmp/predicate.json "$IMG"

      - name: Verify signature and attestation
        if: ${{ steps.repro.outputs.push == 'true' }}
        env:
          IMG: ghcr.io/spr-networks/spr-vaultwarden@${{ steps.digest.outputs.digest }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/spr-networks/spr-vaultwarden/\.github/workflows/docker-image\.yml@' \
            "$IMG"
          cosign verify-attestation --type slsaprovenance1 \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/spr-networks/spr-vaultwarden/\.github/workflows/docker-image\.yml@' \
            "$IMG"
